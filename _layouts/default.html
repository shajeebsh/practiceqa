<!DOCTYPE html>
<html>
<head>

    <title>{{ page.title }} | Practice QA</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        h1 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        h2 { color: #2c3e50; margin-top: 30px; }

        .post-title a:hover { text-decoration: underline; }
        .post-date { color: #666; font-size: 0.9em; }

    </style>

    <h1><a href="{{ site.baseurl }}/" style="text-decoration: none; color: #2c3e50;">Practice QA</a></h1>

        {{ content }}
